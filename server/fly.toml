app = "messenger-server"
primary_region = "lax"

[build]

[deploy]
  release_command = "npx prisma migrate deploy"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[statics]]
  guest_path = "/app/uploads"
  url_prefix = "/uploads"
